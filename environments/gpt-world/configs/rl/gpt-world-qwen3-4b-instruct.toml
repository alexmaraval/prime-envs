model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 800
batch_size = 256
rollouts_per_example = 8
learning_rate = 1e-5
lora_alpha = 16
oversampling_factor = 1.5
#trajectory_strategy = "branching"
max_async_level = 2
env_file = ["../../../../secrets.env"]

[sampling]
max_tokens = 256
temperature = 1.0

# Push the environment first, then replace this placeholder with the Hub id
# you want hosted training to use, for example `your-name/gpt-world`.
[[env]]
id = "alex-maraval/gpt-world"
args = { difficulty = "all", num_examples = 10000, seed = 11, max_turns = 32 }

[wandb]
project = "gpt-world"
name = "qwen3-4b-instruct-gpt-world-v0.1.0"
entity = "maraval-alexandre"

[eval]
interval = 50
num_examples = 100
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "alex-maraval/gpt-world"
args = { difficulty = "all", num_examples = 100, seed = 111, max_turns = 32 }

[val]
num_examples = 100
rollouts_per_example = 1
interval = 10

[checkpoints]
interval = 50
keep_cloud = 5

[adapters]
interval = 50
keep_last = 3
