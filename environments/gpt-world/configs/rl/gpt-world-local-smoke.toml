model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 150
batch_size = 128
rollouts_per_example = 8
learning_rate = 5e-5
lora_alpha = 16
oversampling_factor = 1.25
trajectory_strategy = "branching"
max_async_level = 1
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 256
temperature = 1.0

# Self-managed smoke config for a locally installed environment.
# Run `prime env install gpt-world` before launching this config.
[[env]]
id = "gpt-world"
args = { difficulty = "all", num_examples = 2048, seed = 11, max_turns = 48 }

[wandb]
project = "gpt-world"
name = "qwen3-4b-gpt-world-local-smoke"
entity = "maraval-alexandre"

[eval]
interval = 25
num_examples = 24
rollouts_per_example = 4
eval_base_model = true

[[eval.env]]
id = "gpt-world"
args = { difficulty = "all", num_examples = 24, seed = 111, max_turns = 48 }

[val]
num_examples = 24
rollouts_per_example = 1
interval = 10

[checkpoints]
interval = 50
keep_cloud = 3

[adapters]
interval = 50
keep_last = 2

# GPT-World rewards are lightly shaped rather than purely binary:
# invalid actions are penalized, key pickup gives partial credit, and solve gives +1.
# Start without online difficulty filtering, then enable thresholds after inspecting
# rollout reward histograms from the first run.
# [buffer]
# easy_threshold = 0.9
# hard_threshold = 0.05
# easy_fraction = 0.1
# hard_fraction = 0.3
# online_difficulty_filtering = true
# seed = 42
