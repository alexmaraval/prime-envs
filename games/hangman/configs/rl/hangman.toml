model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 300
batch_size = 128
rollouts_per_example = 8
learning_rate = 5e-5
lora_alpha = 16
oversampling_factor = 2.0
env_files = ["../../secrets.env"]
# trajectory_strategy = "interleaved"  # or "branching"
# max_async_level = 2

[sampling]
max_tokens = 256

# Swap `hangman_agent` for your Hub id after `prime env push` if you want hosted runs
# to pull the published environment instead of the local workspace package.
[[env]]
id = "alex-maraval/hangman-agent"
args = { difficulty = "medium", num_examples = 1000, seed = 11, word_length_min = 4, word_length_max = 10, frequency_tiers = ["common", "standard", "obscure"], repeat_density_min = 0.0, repeat_density_max = 0.7, allowed_attempts_min = 4, allowed_attempts_max = 12, ambiguity_min = 1, ambiguity_max = 80 }

[wandb]
project = "hangman"
name = "qwen3-4b-hangman-mixed"
entity = "maraval-alexandre"

[eval]
interval = 25
num_examples = 24
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "alex-maraval/hangman-agent"
args = { difficulty = "easy", num_examples = 24, seed = 111 }

[[eval.env]]
id = "alex-maraval/hangman-agent"
args = { difficulty = "medium", num_examples = 24, seed = 222 }

[[eval.env]]
id = "alex-maraval/hangman-agent"
args = { difficulty = "hard", num_examples = 24, seed = 333 }

[val]
num_examples = 72
rollouts_per_example = 1
interval = 10

[buffer]
easy_threshold = 0.75
hard_threshold = 0.15
easy_fraction = 0.2
hard_fraction = 0.5
online_difficulty_filtering = true
seed = 42
