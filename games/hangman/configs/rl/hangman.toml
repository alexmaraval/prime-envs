model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 300
batch_size = 128
rollouts_per_example = 8
learning_rate = 5e-5
lora_alpha = 16
oversampling_factor = 1.0
env_files = ["../../secrets.env"]
trajectory_strategy = "branching"
max_async_level = 1

[sampling]
max_tokens = 256

# Push `alex-maraval/hangman_agent` version `0.2.6` before launching this run.
# `difficulty_mix` is an env-native feature, and `0.2.x` adds hosted-run parsing for bracketed string inputs.
[[env]]
id = "alex-maraval/hangman_agent"
args = { num_examples = 1000, seed = 11, difficulty_mix = [0.3, 0.4, 0.3] }

[wandb]
project = "hangman"
name = "qwen3-4b-hangman-v024-tagged-10k"
entity = "maraval-alexandre"

[eval]
interval = 25
num_examples = 24
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "alex-maraval/hangman_agent"
args = { difficulty = "easy", num_examples = 24, seed = 111 }

[[eval.env]]
id = "alex-maraval/hangman_agent"
args = { difficulty = "medium", num_examples = 24, seed = 222 }

[[eval.env]]
id = "alex-maraval/hangman_agent"
args = { difficulty = "hard", num_examples = 24, seed = 333 }

# Disable validation until the run can complete step 0 cleanly.
