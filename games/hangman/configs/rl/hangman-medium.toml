model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 500
batch_size = 256
rollouts_per_example = 8
learning_rate = 1e-5
lora_alpha = 16
oversampling_factor = 1.5
trajectory_strategy = "branching"
max_async_level = 2
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 512

# Push `alex-maraval/hangman_agent` version `0.2.9` before launching this run.
# `difficulty_mix` is an env-native feature, and `0.2.x` adds hosted-run parsing for bracketed string inputs.
[[env]]
id = "alex-maraval/hangman_agent"
args = { num_examples = 10000, seed = 11, difficulty_mix = [0.3, 0.4, 0.3] }

[wandb]
project = "hangman"
name = "qwen3-30b-a3b-hangman-v027"
entity = "maraval-alexandre"

[eval]
interval = 50
num_examples = 25
rollouts_per_example = 4
eval_base_model = true

[[eval.env]]
id = "alex-maraval/hangman_agent"
args = { num_examples = 24, seed = 111, difficulty_mix = [0.3, 0.4, 0.3] }

[val]
num_examples = 25
rollouts_per_example = 1
interval = 10

[checkpoints]
interval = 50
keep_cloud = 5

[adapters]
interval = 50
keep_last = 3

# Hangman has a continuous reward in roughly [0, 2], so binary-style
# difficulty thresholds should be tuned from real rollout histograms first.
# [buffer]
# easy_threshold = 0.75
# hard_threshold = 0.15
# easy_fraction = 0.2
# hard_fraction = 0.5
# online_difficulty_filtering = true
# seed = 42

# The docs also support:
# [infrastructure]
# compute_size = "M"
#
# For Hangman this environment is lightweight, so the default compute size
# should be enough unless hosted runs show the env itself becoming CPU-bound.
